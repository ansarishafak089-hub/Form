<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.container{
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}
</style>
</head>

<body>

<div class="container">

    <form id="loginForm">

        <h2>Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Submit
        </button>

    </form>

</div>

<script>
const SUPABASE_URL = "https://zwczrfjffrfdwsvzlymn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Y3pyZmpmZnJmZHdzdnpseW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODg2ODEsImV4cCI6MjA5ODU2NDY4MX0.5OE7HUaNnoKWGY2CF533m921zOSVnckCMJmDTQ8LSmE";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Please fill in both fields.");
        return;
    }

    const submitBtn = e.target.querySelector("button");
    submitBtn.disabled = true;
    submitBtn.textContent = "Saving...";

    const { data, error } = await supabase
        .from("users")
        .insert([{ username, password }])
        .select();

    submitBtn.disabled = false;
    submitBtn.textContent = "Submit";

    if (error) {
        console.error("Supabase error:", error);
        alert("Error: " + error.message);
    } else {
        console.log("Saved:", data);
        alert("Data Saved Successfully ✅");
        document.getElementById("loginForm").reset();
    }
});
</script>
</body>
</html>
