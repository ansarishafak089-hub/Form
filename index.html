<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register User</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:350px;
    background:#1f2937;
    padding:30px;
    border-radius:12px;
    color:white;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#374151;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

<h2>Registration Form</h2>

<form id="userForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="text"
id="username"
placeholder="Username"
required>

<button type="submit">
Submit
</button>

</form>

<p id="status"></p>

</div>

<script>

const SUPABASE_URL = "https://zwczrfjffrfdwsvzlymn.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Y3pyZmpmZnJmZHdzdnpseW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODg2ODEsImV4cCI6MjA5ODU2NDY4MX0.5OE7HUaNnoKWGY2CF533m921zOSVnckCMJmDTQ8LSmE";

document
.getElementById("userForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const name = document.getElementById("name").value.trim();

const username = document.getElementById("username").value.trim();

const res = await fetch(
`${SUPABASE_URL}/rest/v1/users`,
{
method:"POST",
headers:{
"apikey":SUPABASE_ANON_KEY,
"Authorization":"Bearer "+SUPABASE_ANON_KEY,
"Content-Type":"application/json",
"Prefer":"return=representation"
},
body:JSON.stringify({
name:name,
username:username
})
});

const data = await res.json();

if(res.ok){

document.getElementById("status").innerHTML =
"✅ User Added Successfully";

document.getElementById("userForm").reset();

console.log(data);

}else{

document.getElementById("status").innerHTML =
"❌ "+JSON.stringify(data);

console.log(data);

}

});

</script>

</body>
</html>
